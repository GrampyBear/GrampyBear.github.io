<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EL PESO DEL LINAJE: CRÓNICAS DE SATURACIÓN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header id="stats-hud">
            <div class="stat">SUJETO: <span id="role">PADRE</span></div>
            <div class="stat">PESO: <span id="weight">95</span>kg</div>
            <div class="stat">INTEGRIDAD: <span id="integrity">ALTA</span></div>
        </header>
        
        <div id="visual-overlay"></div>

        <main id="scene-viewport">
            <h2 id="chapter-name">PROLOGO</h2>
            <div id="dialogue-box">
                <p id="narrative-text"></p>
            </div>
            <div id="options-stack"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
