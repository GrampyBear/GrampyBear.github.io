<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo de Expansión | VN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <header id="stats-bar">
            <div class="stat">Sujeto: <span id="subject-name">-</span></div>
            <div class="stat">Masa: <span id="stat-weight">0</span> kg</div>
            <div class="stat">Capacidad: <span id="stat-capacity">0</span>%</div>
            <div class="stat">Vínculo: <span id="stat-bond">0</span>%</div>
        </header>

        <main id="main-display">
            <div id="visual-fx"></div>
            <div id="narrative-container">
                <p id="scene-description"></p>
                <p id="scene-text"></p>
            </div>
        </main>

        <footer id="interaction-pane">
            <div id="choices-grid"></div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
