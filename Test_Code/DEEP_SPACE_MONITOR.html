<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSMS V4.5 // NASA_INTEGRATED_OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');
        body { background-color: #020617; font-family: 'Fira Code', monospace; color: #94a3b8; }
        .monitor-border { border: 1px solid #1e293b; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .scanline {
            width: 100%; height: 2px; background: rgba(34, 211, 238, 0.05);
            position: absolute; animation: scan 8s linear infinite; pointer-events: none; z-index: 60;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        .data-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700; }
        .cmd-btn { @apply bg-indigo-950 border border-indigo-500 text-indigo-400 px-3 py-1 text-[9px] font-bold hover:bg-indigo-500 hover:text-white transition-all uppercase; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; }
    </style>
</head>
<body class="p-4 lg:p-6 overflow-x-hidden">
    <div class="scanline"></div>

    <header class="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-end border-b border-cyan-900/30 pb-2">
        <div>
            <h1 class="text-xl font-black text-cyan-400 tracking-tighter">DSMS_V4.5 // GLOBAL_SURVEILLANCE</h1>
            <p class="text-[9px] text-slate-500 font-bold">UPLINK: ACTIVE // ENCRYPTION: AES_256</p>
        </div>
        <div class="flex gap-2 mb-1">
            <button onclick="loadAPOD()" class="cmd-btn">Deep_Space</button>
            <button onclick="loadEPIC()" class="cmd-btn">Earth_Live</button>
            <button onclick="loadEONET()" class="cmd-btn">Global_Events</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <section class="lg:col-span-8 space-y-6">
            <div class="monitor-border rounded p-4 relative overflow-hidden shadow-2xl shadow-cyan-950/20">
                <div class="flex justify-between items-center mb-2">
                    <span id="cam-id" class="data-label text-cyan-600">UNIT_01 // STBY</span>
                    <span id="timestamp" class="text-[9px] text-slate-600 font-bold"></span>
                </div>
                
                <div id="display-core" class="w-full bg-black rounded border border-cyan-900/20 flex items-center justify-center min-h-[460px]">
                    <div class="text-cyan-900 animate-pulse text-[10px]">AWAITING_COMMAND...</div>
                </div>

                <div class="mt-4 flex flex-col md:flex-row gap-4 border-t border-slate-900 pt-4">
                    <div class="flex-grow">
                        <h2 id="meta-title" class="text-md font-bold text-cyan-200 uppercase tracking-tight"></h2>
                        <div id="meta-body" class="text-[10px] text-slate-500 mt-2 h-20 overflow-y-auto leading-relaxed pr-4"></div>
                    </div>
                    <div id="telemetry-stream" class="min-w-[150px] bg-cyan-950/10 p-2 text-[9px] font-mono text-cyan-700 border-l border-cyan-900/30">
                        <p class="text-slate-600 mb-1 border-b border-slate-900 pb-1 uppercase font-bold">Live_Telemetry</p>
                    </div>
                </div>
            </div>
        </section>

        <aside class="lg:col-span-4 space-y-6">
            <div class="monitor-border rounded p-4 border-l-2 border-red-900/40">
                <span class="data-label text-red-500">EONET // NATURAL_DISASTERS</span>
                <div id="eonet-feed" class="mt-3 space-y-2 h-32 overflow-y-auto pr-2 text-[9px]"></div>
            </div>

            <div class="monitor-border rounded p-4">
                <span class="data-label text-cyan-600">NEOWS // PROXIMITY_RADAR</span>
                <div id="neo-feed" class="mt-3 space-y-2 text-[10px]"></div>
            </div>

            <div class="monitor-border rounded p-4 bg-black/20">
                <span class="data-label text-orange-600">InSight // MARS_SOL_METADATA</span>
                <div id="mars-data" class="mt-2 text-[10px] grid grid-cols-2 gap-2 text-orange-200">
                    <div class="p-1 border border-orange-950/30">SOL: <span id="sol-val" class="font-bold">-</span></div>
                    <div class="p-1 border border-orange-950/30">AVG: <span id="temp-val" class="font-bold">-</span></div>
                </div>
            </div>

            <div class="monitor-border rounded p-3 h-40 flex flex-col bg-black/40">
                <span class="data-label text-green-800 text-[8px]">System_Kernel_Log</span>
                <div id="log-console" class="mt-2 text-[9px] text-green-950 font-mono overflow-y-auto flex-grow lowercase"></div>
            </div>
        </aside>
    </main>

    <script>
        const API_KEY = 'DEMO_KEY'; // Reemplazar con tu key real

        function writeLog(msg) {
            const console = document.getElementById('log-console');
            console.innerHTML += `> ${msg}<br>`;
            console.scrollTop = console.scrollHeight;
        }

        // --- APOD MODULE ---
        async function loadAPOD() {
            document.getElementById('cam-id').innerText = "UNIT_01 // APOD_FEED";
            writeLog("init: fetching_deep_space_imagery...");
            const res = await fetch(`https://api.nasa.gov/planetary/apod?api_key=${API_KEY}&thumbs=true`);
            const data = await res.json();
            document.getElementById('display-core').innerHTML = data.media_type === 'video' 
                ? `<iframe src="${data.url}" class="w-full h-full border-0"></iframe>`
                : `<img src="${data.url}" class="max-h-[450px] w-auto rounded object-contain">`;
            document.getElementById('meta-title').innerText = data.title;
            document.getElementById('meta-body').innerText = data.explanation;
            document.getElementById('timestamp').innerText = `TS: ${data.date}`;
            writeLog("sync: apod_data_online.");
        }

        // --- EPIC MODULE ---
        async function loadEPIC() {
            document.getElementById('cam-id').innerText = "UNIT_01 // EPIC_SAT_L1";
            writeLog("init: earth_surveillance_sequence...");
            const res = await fetch(`https://api.nasa.gov/EPIC/api/natural?api_key=${API_KEY}`);
            const meta = await res.json();
            const target = meta[0];
            const dateStr = target.date.split(' ')[0].replace(/-/g, '/');
            const imgUrl = `https://api.nasa.gov/EPIC/archive/natural/${dateStr}/png/${target.image}.png?api_key=${API_KEY}`;
            
            document.getElementById('display-core').innerHTML = `<img src="${imgUrl}" class="max-h-[400px] w-auto rounded-full shadow-[0_0_50px_rgba(34,211,238,0.1)]">`;
            document.getElementById('meta-title').innerText = "Live Earth Polychromatic Monitor";
            document.getElementById('meta-body').innerText = `Centroid: Lat ${target.centroid_coordinates.lat}, Lon ${target.centroid_coordinates.lon}. Tracking Earth from L1 point.`;
            
            document.getElementById('telemetry-stream').innerHTML = `
                <p class="text-cyan-500">QUATERNIONS:</p>
                Q0: ${target.attitude_quaternions.q0.toFixed(4)}<br>
                Q1: ${target.attitude_quaternions.q1.toFixed(4)}<br>
                Q2: ${target.attitude_quaternions.q2.toFixed(4)}
            `;
            writeLog("sync: epic_imagery_active.");
        }

        // --- EONET MODULE (Natural Events) ---
        async function loadEONET() {
            writeLog("query: scanning_natural_events...");
            const res = await fetch(`https://eonet.gsfc.nasa.gov/api/v3/events?limit=10&status=open`);
            const data = await res.json();
            let html = '';
            data.events.forEach(ev => {
                html += `<div class="border-b border-red-900/20 pb-1">
                    <span class="text-red-400 font-bold uppercase">${ev.categories[0].title}</span><br>
                    <span class="text-slate-500">${ev.title}</span>
                </div>`;
            });
            document.getElementById('eonet-feed').innerHTML = html;
            writeLog("sync: eonet_database_updated.");
        }

        // --- NEOWS MODULE ---
        async function loadNeoWs() {
            const today = new Date().toISOString().split('T')[0];
            const res = await fetch(`https://api.nasa.gov/neo/rest/v1/feed?start_date=${today}&api_key=${API_KEY}`);
            const data = await res.json();
            const list = data.near_earth_objects[today].slice(0, 5);
            let html = '';
            list.forEach(ast => {
                const hazard = ast.is_potentially_hazardous_asteroid ? '<span class="text-red-600">[!]</span>' : '';
                html += `<div class="border-b border-cyan-950 pb-1">
                    <span class="text-cyan-200 font-bold">> ${ast.name.replace(/[()]/g,'')}</span> ${hazard}<br>
                    <span class="text-[8px] text-slate-600 tracking-tighter">DIST: ${Math.round(ast.close_approach_data[0].miss_distance.kilometers)} KM</span>
                </div>`;
            });
            document.getElementById('neo-feed').innerHTML = html;
        }

        // --- INSIGHT MODULE ---
        async function loadMars() {
            const res = await fetch(`https://api.nasa.gov/insight_weather/?feedtype=json&ver=1.0&api_key=${API_KEY}`);
            const data = await res.json();
            const lastSol = data.sol_keys[data.sol_keys.length - 1];
            document.getElementById('sol-val').innerText = lastSol;
            document.getElementById('temp-val').innerText = data[lastSol].AT ? data[lastSol].AT.av.toFixed(0) + "C" : "N/A";
        }

        window.onload = () => {
            loadAPOD();
            loadNeoWs();
            loadMars();
            loadEONET();
            writeLog("system: all_modules_ready_v4.5");
        };
    </script>
</body>
</html>
