<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DSMS V9 // DEEP_SPACE_MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="dsms.css">
</head>
<body class="p-4 bg-slate-950 text-slate-400 font-mono overflow-hidden h-screen">
    <div class="scanline"></div>

    <div class="max-w-7xl mx-auto h-full flex flex-col">
        <header class="flex justify-between items-center border-b border-cyan-900/50 pb-2 mb-4">
            <div>
                <h1 class="text-xl font-black text-cyan-500 italic tracking-tighter">DSMS_V9 // CORE</h1>
                <p class="text-[8px] text-cyan-900 font-bold uppercase">Source: Open_Celestial_Database</p>
            </div>
            <div id="clock" class="text-cyan-800 text-xs">00:00:00</div>
        </header>

        <div class="grid grid-cols-12 gap-4 flex-grow overflow-hidden mb-4">
            <aside class="col-span-3 border border-cyan-900/20 bg-black/40 p-4 overflow-y-auto">
                <span class="text-[10px] text-cyan-700 font-bold block mb-4 uppercase">Celestial_Registry</span>
                <div id="nav-list" class="space-y-1 text-[10px]">
                    <div class="animate-pulse text-cyan-900">Scanning frequency...</div>
                </div>
            </aside>

            <main class="col-span-9 border border-cyan-900/20 bg-black/20 p-6 flex flex-col relative">
                <div class="absolute top-4 right-4 text-[10px] text-cyan-900" id="target-coord">LOC: -- // --</div>
                
                <div class="flex-grow flex flex-col justify-center items-center">
                    <h2 id="target-name" class="text-7xl font-black text-slate-900 uppercase tracking-tighter transition-all duration-700">Standby</h2>
                    <div id="telemetry-box" class="grid grid-cols-3 gap-4 w-full max-w-2xl mt-12 opacity-0 transition-opacity">
                        </div>
                </div>

                <div class="mt-auto border-t border-cyan-900/10 pt-4">
                    <div id="target-desc" class="text-[10px] text-slate-600 italic max-w-2xl">Awaiting system initialization...</div>
                </div>
            </main>
        </div>

        <footer class="h-24 border border-cyan-900/20 bg-black/60 p-2 overflow-y-auto text-[9px] font-mono text-green-900">
            <div id="kernel-log"></div>
        </footer>
    </div>

    <script src="dsms.js"></script>
</body>
</html>
