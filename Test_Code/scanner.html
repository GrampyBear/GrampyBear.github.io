<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NASA API Capability Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: #94a3b8; font-family: monospace; }
        .status-ok { color: #22c55e; }
        .status-error { color: #ef4444; }
        .status-pending { color: #eab308; }
        pre { font-size: 0.7rem; background: #111; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-white mb-2">SISTEMA DE ESCANEO DE CAPACIDADES NASA</h1>
        <p class="text-xs mb-8 border-b border-slate-800 pb-4 text-slate-500 underline">ESCANEO DE ENDPOINTS DISPONIBLES V1.0</p>

        <div class="mb-6 flex gap-4">
            <input id="api-key" type="password" placeholder="PEGA TU API KEY AQUÍ" 
                   class="bg-slate-900 border border-slate-700 p-2 rounded w-full text-white outline-none focus:border-blue-500">
            <button onclick="startScan()" class="bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-700">INICIAR ESCANEO</button>
        </div>

        <div id="results" class="space-y-4">
            </div>
    </div>

    <script>
        const ENDPOINTS = [
            { name: "APOD", url: "https://api.nasa.gov/planetary/apod" },
            { name: "NEOWS (Asteroides)", url: "https://api.nasa.gov/neo/rest/v1/feed?start_date=2026-04-01&end_date=2026-04-01" },
            { name: "MARS ROVER (Curiosity)", url: "https://api.nasa.gov/mars-photos/api/v1/rovers/curiosity/photos?sol=1000&page=1" },
            { name: "EPIC (Tierra)", url: "https://api.nasa.gov/EPIC/api/natural" },
            { name: "DONKI (Clima Espacial)", url: "https://api.nasa.gov/DONKI/CME?startDate=2026-01-01" },
            { name: "EONET (Desastres)", url: "https://eonet.gsfc.nasa.gov/api/v3/events" }, // No requiere siempre Key, pero es bueno testear
            { name: "TECHPORT", url: "https://api.nasa.gov/techport/api/projects" },
            { name: "INSIGHT (Clima Marte)", url: "https://api.nasa.gov/insight_weather/?feedtype=json&ver=1.0" }
        ];

        async function startScan() {
            const key = document.getElementById('api-key').value;
            const container = document.getElementById('results');
            
            if(!key) return alert("Por favor, ingresa tu API Key");
            container.innerHTML = ""; // Limpiar

            for (const ep of ENDPOINTS) {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 p-4 rounded-lg";
                card.innerHTML = `<h2 class="font-bold text-white">${ep.name}</h2><p class="status-pending text-xs">Testeando...</p>`;
                container.appendChild(card);

                try {
                    const separator = ep.url.includes('?') ? '&' : '?';
                    const response = await fetch(`${ep.url}${separator}api_key=${key}`);
                    const data = await response.json();

                    if (response.ok) {
                        card.querySelector('p').className = "status-ok text-xs font-bold";
                        card.querySelector('p').innerText = "✓ ACCESO CONCEDIDO";
                        
                        // Detectar qué hay dentro automáticamente
                        const keysFound = Object.keys(Array.isArray(data) ? data[0] || {} : data).slice(0, 8);
                        const info = document.createElement('pre');
                        info.innerText = `Campos detectados: ${keysFound.join(', ')}...\n\nData de ejemplo: ${JSON.stringify(data, null, 2).substring(0, 200)}...`;
                        card.appendChild(info);
                    } else {
                        throw new Error(data.error?.message || "Error desconocido");
                    }
                } catch (err) {
                    card.querySelector('p').className = "status-error text-xs font-bold";
                    card.querySelector('p').innerText = `✕ FALLIDO: ${err.message}`;
                }
            }
        }
    </script>
</body>
</html>
