<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NASA API Blind Scanner</title>
    <style>
        body { background: #0b0d17; color: #d1d1d1; font-family: 'Courier New', monospace; padding: 20px; }
        .panel { background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 5px; }
        #console { background: #000; height: 450px; overflow-y: auto; padding: 10px; margin-top: 15px; border: 1px solid #444; font-size: 12px; }
        input { background: #0d1117; border: 1px solid #30363d; color: #58a6ff; padding: 8px; width: 250px; }
        button { background: #238636; border: none; color: white; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
        .found { color: #7cfc00; text-shadow: 0 0 5px #7cfc00; }
        .info { color: #00d4ff; }
        .warn { color: #ffcc00; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>🚀 NASA API Deep Scanner</h2>
        <p>Probando endpoints conocidos y ocultos de la NASA a ciegas.</p>
        <input type="text" id="apiKey" placeholder="NASA_API_KEY (o DEMO_KEY)">
        <button onclick="runNasaScan()">Lanzar Fuerza Bruta</button>
    </div>

    <div id="console">-- Ready for ignition --</div>

    <script>
        const log = (msg, type = "") => {
            const c = document.getElementById('console');
            c.innerHTML += `<div class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            c.scrollTop = c.scrollHeight;
        };

        // Endpoints específicos de la infraestructura de la NASA
        const nasaEndpoints = [
            'planetary/apod', 'planetary/earth/assets', 'planetary/earth/imagery',
            'mars-photos/api/v1/rovers/curiosity/photos', 'mars-photos/api/v1/manifests/Curiosity',
            'neo/rest/v1/feed', 'neo/rest/v1/stats',
            'insight_weather/', 'DONKI/CME', 'DONKI/GST',
            'EPIC/api/natural', 'exoplanet/api/stats',
            'techport/api/projects', 'tle/api/stations',
            'genetics/readdata', 'skymorph/search'
        ];

        async function runNasaScan() {
            const key = document.getElementById('apiKey').value || "DEMO_KEY";
            const baseUrl = "https://api.nasa.gov";
            
            log(`Iniciando secuencia con Key: ${key}`, "info");

            for (const endpoint of nasaEndpoints) {
                // La NASA prefiere api_key como parámetro de URL
                const url = `${baseUrl}/${endpoint}?api_key=${key}`;
                
                try {
                    const response = await fetch(url);
                    const status = response.status;
                    
                    // Extraer info de Rate Limit de los Headers de la NASA
                    const limit = response.headers.get('X-RateLimit-Limit');
                    const remaining = response.headers.get('X-RateLimit-Remaining');

                    if (status === 200) {
                        const data = await response.json();
                        const keysFound = Object.keys(data).slice(0, 3).join(', ');
                        log(`[HIT] 200 OK: /${endpoint} | Data: {${keysFound}...}`, "found");
                    } else if (status === 403) {
                        log(`[403] Bloqueado: /${endpoint} (Key sin permisos o IP baneada)`, "warn");
                    } else if (status === 429) {
                        log(`[!!!] RATE LIMIT EXCEDIDO. Restante: ${remaining}/${limit}`, "warn");
                        break; // Detenemos para no quemar la IP
                    } else {
                        log(`[${status}] Saltando: /${endpoint}`);
                    }
                } catch (e) {
                    log(`[ERR] Fallo de conexión en /${endpoint}`, "warn");
                }
                
                // Pequeño delay para no disparar el WAF de la NASA instantáneamente
                await new Promise(r => setTimeout(r, 200));
            }
            log("Escaneo completado.", "info");
        }
    </script>
</body>
</html>
