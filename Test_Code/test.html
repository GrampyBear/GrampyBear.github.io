<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformación Familiar - VN</title>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #stats-panel { background: #222; padding: 15px; border-bottom: 2px solid #444; display: flex; justify-content: space-around; }
        #game-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
        #text-box { background: rgba(0,0,0,0.8); border: 2px solid #d4af37; padding: 20px; min-height: 100px; border-radius: 10px; margin-bottom: 20px; }
        .choice-btn { background: #444; color: white; border: none; padding: 10px; margin: 5px; cursor: pointer; border-radius: 5px; transition: 0.3s; width: 100%; }
        .choice-btn:hover { background: #d4af37; color: black; }
        .stat-val { color: #d4af37; font-weight: bold; }
    </style>
</head>
<body>

<div id="stats-panel">
    <div>Personaje: <span id="char-name" class="stat-val">Padre</span></div>
    <div>Peso: <span id="stat-weight" class="stat-val">95</span> kg</div>
    <div>Estado: <span id="stat-status" class="stat-val">Atlético</span></div>
</div>

<div id="game-container">
    <div id="text-box">
        <p id="story-text">La cena está servida. Tu padre te mira con curiosidad mientras sirves una porción triple de postre en su plato...</p>
    </div>
    <div id="choices">
        </div>
</div>

<script>
    let stats = { weight: 95, status: "Atlético" };

    function updateStats() {
        document.getElementById('stat-weight').innerText = stats.weight;
        document.getElementById('stat-status').innerText = stats.status;
        if(stats.weight > 120) stats.status = "Pesado";
        if(stats.weight > 150) stats.status = "Inmenso";
    }

    function choose(opt) {
        if(opt === 1) {
            stats.weight += 5;
            showText("Él sonríe y empieza a comer. Notas cómo su camisa empieza a tensarse sobre su abdomen.");
            renderChoices([
                { text: "Traer más comida", action: () => choose(1) },
                { text: "Comentar lo mucho que ha crecido", action: () => choose(2) }
            ]);
        } else {
            showText("La tensión en la habitación aumenta. El deseo de verlo crecer es mutuo.");
            // Aquí podrías saltar a otra rama de la historia
        }
        updateStats();
    }

    function showText(msg) { document.getElementById('story-text').innerText = msg; }

    function renderChoices(options) {
        const container = document.getElementById('choices');
        container.innerHTML = "";
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.innerText = opt.text;
            btn.onclick = opt.action;
            container.appendChild(btn);
        });
    }

    // Inicio
    renderChoices([
        { text: "Animarlo a seguir comiendo", action: () => choose(1) },
        { text: "Admirar su barriga creciente", action: () => choose(2) }
    ]);
</script>

</body>
</html>
